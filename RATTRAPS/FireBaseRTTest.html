


<div id="messages"></div>

<div id="UserInput">
<input id="data" placeholder="Enter message" onkeydown="if(event.key==='Enter')send()">
<button onclick="send()" >Send</button> 
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://rattraps-3rd-edition-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db, "data");

window.send = function(){
  const text = document.getElementById("data").value;
  if(text){
    push(messagesRef, {
      value: text,
      time: Date.now()
    });
    document.getElementById("data").value = "";
    
    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
  }
};

// Live listener: fires immediately + whenever data changes
onValue(messagesRef, snapshot => {
  const data = snapshot.val();
  let html = "";

  for(let id in data || {}){
    html += `<p>${data[id].value}</p>`;
  }

  document.getElementById("messages").innerHTML = html;
});
</script>

<style>
    #messages{
        height:80%;
        width:80%;
        border:solid black .2em;
        border-radius:.5em;
        padding:1em;
        margin:1em;
        overflow:auto;
    }
    #UserInput{
      display:flex;
      justify-content:space-around;
      height:10%;  
    }
    input{
        width:80%;
        height:100%;
    }
    button{
        width:10%;
    }
</style>
