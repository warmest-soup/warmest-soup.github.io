<meta
  name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
 
<div id="Page">

    <div id="messages"></div>

    <div id="UserInput">

        <div id="AuthorLine">
            <input id="Author" placeholder="Anonymous" onChange="setUser(this, Color)">
            <input id="Color" placeholder="Color Definition" onChange="setUser(Author, this)">
        </div>

        <div id="MessageBody">
            <Textarea id="Message" placeholder="Enter message" onkeydown="if(event.key==='Enter')hotSend(event)"></textarea>  

            <button id="SendButton" onclick="send()">Send</button> 

        </div>

    </div>
</div>


<script type="module">
    //Load Firebase DB.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    //Get RATTRAPS Log
    const firebaseConfig = {
        databaseURL: "https://rattraps-3rd-edition-default-rtdb.firebaseio.com"
    };

    const db = getDatabase(initializeApp(firebaseConfig));
    const messagesRef = ref(db, "MessageLog");

    var messageLog = document.getElementById("messages")
    window.send = function () {
        var text = document.getElementById("Message").value
        var author = document.getElementById("Author").value 
        var colorID = document.getElementById("Color").value 
        var colorCheck = colorID.substring(0, 3).toLowerCase();
        
        if(!author){ 
            author="Anonymous";
        }
        if(!colorCheck){
            colorID="White"
        }
        if (text) {
            push(messagesRef, {
                author: author,
                message: text,
                color: colorID,
                time: new Date().toString()
            });
            document.getElementById("Message").value = "";

            messageLog.scrollTop = messageLog.scrollHeight;
        }
    };

    // Live listener: fires immediately + whenever data changes
    onValue(messagesRef, snapshot => {
        const data = snapshot.val();
        let html = "";

        for (let id in data || {}) {
            html += `<div class='SentMessages'><div class='PrevAuthors' style='color:${data[id].color};'> ${data[id].author}: </div>     ${data[id].message}</div>`;
        }

        document.getElementById("messages").innerHTML = html;
        
        messageLog.scrollTop = messageLog.scrollHeight;
    });
    
    window.hotSend = function (e) {
        e.preventDefault()
        send();
    }
    
    window.setUser = function (userName, userColor){
        document.cookie = userName.value + ", " + userColor.value;  
        
        console.log(document.cookie);
    }
    
    window.loadUser = function (){
        var lastName = document.cookie.split(", ")[0]; 
        var lastColor = document.cookie.split(", ")[1];
        if(lastName == "undefined"){
            lastName = "Anonymous";
        }
        if(lastColor == "undefined"){
            lastColor = "White";
        }
        document.getElementById("Author").value = lastName; 
        document.getElementById("Color").value = lastColor;  
    }
    loadUser() 
</script>
