<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<div id="Page">

    <div id="messages"></div>

    <div id="UserInput">

        <div id="AuthorLine">
            <input id="Author" placeholder="Anonymous" onChange="setUser(this, Color)">
            <input id="Color" placeholder="Color Definition" onChange="setUser(Author, this); setColorTest()">
        </div>

        <div id="MessageBody">
            <Textarea id="Message" placeholder="Enter message"
                onkeydown="if(event.key==='Enter')hotSend(event)"></textarea>

            <button id="SendButton" onclick="send()">Send</button>

        </div>

    </div>
</div>


<script type="module">
    //Load Firebase DB.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    //Get RATTRAPS Log
    const firebaseConfig = {
        databaseURL: "https://rattraps-3rd-edition-default-rtdb.firebaseio.com"
    };

    const db = getDatabase(initializeApp(firebaseConfig));
    const messagesLog = ref(db, "MessageLog");

    var messageLog = document.getElementById("messages")


    window.formatReply = function () {
        var replyTargets = Array.from(document.getElementsByClassName("reply2This"));

        var formattedReply;

        if (replyTargets[0]) {
            //console.log("This!: " + replyTargets[0].outerHTML ) 

            var replyAuthors = replyTargets.map(x => x.children[0].outerHTML);
            var replyTexts = replyTargets.map(x => x.children[1].innerText);

            //console.log("A: " + replyAuthors)
            //console.log("T" + replyTexts)

            var i = 0;
            formattedReply = "";
            while (i < replyAuthors.length) {
                formattedReply += "<div class='quote'><div>\"" + replyTexts[i] + "\"</div>" +
                    "<div>     - " + replyAuthors[i] + "</div></div>" 

                console.log(i)
                i++;
            }
            formattedReply = "<div class='quotedMessages'>" + formattedReply + "</div>"

        } else formattedReply = "";

        console.log(formattedReply);
        return formattedReply

    }


    window.send = function () {

        formatReply();

        var text = document.getElementById("Message").value
        var author = document.getElementById("Author").value
        var colorID = document.getElementById("Color").value
        var colorCheck = colorID.substring(0, 3).toLowerCase();


        if (!author) {
            author = "Anonymous";
        }
        if (!colorCheck) {
            colorID = "White"
        }
        if (text) {
            push(messagesLog, {
                author: author,
                reply: formatReply(),
                message: text,
                color: colorID,
                time: new Date().toUTCString()
            });
            document.getElementById("Message").value = "";

            messageLog.scrollTop = messageLog.scrollHeight;
        }
    };

    // Live listener: fires immediately + whenever messageHistorychanges
    onValue(messagesLog, snapshot => {
        const messageHistory = snapshot.val();
        var formattedHistory = "";
        var jump;
        if (messageLog.scrollTop + messageLog.clientHeight >= messageLog.scrollHeight - 1) {
            jump = true;
        } else jump = false;

        var spacer;
        for (let id in messageHistory || {}) {
            
            if(messageHistory[id].reply){
                spacer = "  ⤷  ";
            } else spacer = "     "
            
            formattedHistory += `${messageHistory[id].reply}<div class='SentMessages' onclick="replyTarget(this)"><div class='PrevAuthors' style='color:${messageHistory[id].color};'> ${messageHistory[id].author}: </div> <div>${spacer}${messageHistory[id].message}</div> <div class="timestamp"> ${messageHistory[id].time} </div> </div>`;
        }

        document.getElementById("messages").innerHTML = formattedHistory;
        new Audio('https://github.com/warmest-soup/warmest-soup.github.io/raw/refs/heads/main/Assets/Audio/ButtonClick.mp3').play()
        if (jump) {
            messageLog.scrollTop = messageLog.scrollHeight;
        }

    });

    window.hotSend = function (e) {
        e.preventDefault()
        send();
    }

    window.setColorTest = function () {
        var color = document.getElementById("Color")

        color.style.backgroundColor = color.value;
    }

    window.setUser = function (userName, userColor) {
        document.cookie = userName.value + ", " + userColor.value;

        console.log(document.cookie);
    }

    window.loadUser = function () {
        var lastName = document.cookie.split(", ")[0];
        var lastColor = document.cookie.split(", ")[1];
        if (lastName == "undefined") {
            lastName = "Anonymous";
        }
        if (lastColor == "undefined") {
            lastColor = "White";
        }
        document.getElementById("Author").value = lastName;
        document.getElementById("Color").value = lastColor;
    }

    window.replyTarget = function (target) {
        target.classList.toggle("reply2This")
    }

    messageLog.scrollTop = messageLog.scrollHeight;
    loadUser() 
</script>

    }

    .quotedMessages {

        transform: translatey(2.2em);
        

        box-shadow:
            0em 0em 0em .15em black,
            inset -.1em .1em .1em 0em rgb(255, 255, 255),
            inset .2em -.2em .5em .3em rgb(22, 26, 53);
            
        display:flex;
        flex-direction:column;

    }
    
    .quote{
        color:rgb(231, 222, 223);
        padding:.5em;
        border-radius:1em;
        box-shadow:
        0em 0em 1em 0em rgba(255, 255, 255, 0.493),
        inset 0em 0em 1em 0em rgba(255, 255, 255, 0.301),
        inset 0em 0em 1em 0em rgb(10, 60, 80);
    }

    .quotedMessages>* .PrevAuthors {
        display: inline;
    }

    .PrevAuthors {
        color: #409dc9;
        text-shadow: -.1em .1em .2em black;
    }
    
    .reply2This{
        animation:replyGlow 1s infinite;
    }
    @keyframes replyGlow {
        0%{}
        50%{
            box-shadow:
            0em 0em 0em .15em black,
            inset -.1em .1em .1em 0em rgb(200, 255, 203),
            inset .2em -.2em .5em .3em black,
            0em 0em 1em .5em white;
            
            filter:brightness(200%); 
            
            background:cyan;
        } 
        100%{}
    }
    
    .timestamp{
        color:rgb(105, 145, 190);
        font-size:.9em;
        padding-top:1em;
    }
</style>
