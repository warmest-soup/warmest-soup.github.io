<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
    href="https://fonts.googleapis.com/css2?family=Caudex:ital,wght@0,400;0,700;1,400;1,700&family=Zen+Old+Mincho&display=swap"
    rel="stylesheet">
<link href="./Chat/ChatStyle.css" rel="stylesheet">
</link>

<div id="Page">

    <div id="messages">
        <button id="ToBottom" onclick="messageLog.scrollTop = messageLog.scrollHeight;">⮟</button>
    </div>


    <div id="UserInput">

        <div id="AuthorLine">
            <span class="inputLabel">AUTHOR: </span><input id="Author" placeholder="Anonymous"
                onChange="setUser(this, Color)">
            <span class="inputLabel">COLOR: </span><input id="Color" placeholder="Color Definition"
                onChange="setUser(Author, this); setColorTest()" onclick="this.select()">
            <span class="inputLabel" id="Clock">--:--</span>
            <script>
                setInterval(() => document.getElementById("Clock").textContent = new Date().toUTCString(), 1000)
            </script>
        </div>

        <div id="MessageBody">
            <Textarea id="Message" placeholder="Enter message"
                onkeydown="if(event.key==='Enter' && event.shiftKey){addNewLine()} else if (event.key==='Enter')hotSend(event);"></textarea>

            <div id="buttonControls">
                <button id="LineBreakButton" class="TextButtons" onclick="addNewLine()">Line Break</button>
                <button id="SendButton" class="TextButtons" onclick="send()">Send</button>
            </div>


        </div>

    </div>
</div>


<script type="module">
    //Load Firebase DB.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, onValue, query, limitToLast, onChildAdded, orderByChild, get, onChildRemoved } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    //Get RATTRAPS Log
    const firebaseConfig = {
        databaseURL: "https://rattraps-3rd-edition-default-rtdb.firebaseio.com"
    };

    const db = getDatabase(initializeApp(firebaseConfig));
    const messagesLog = ref(db, "MessageLog");

    var messageLog = document.getElementById("messages")

    var replySelection

    window.formatReply = function () {
        replySelection = Array.from(document.getElementsByClassName("reply2This"));
        var replyTargets = replySelection.map((x) => x.cloneNode(true));

        replySelection.forEach((x) => x.classList.toggle("reply2This"))


        var formattedReply;

        if (replyTargets[0]) {

            replyTargets.forEach((x) => {

                x.children[0].innerText = x.children[0].innerText.slice(0, -1)
            });

            var replyAuthors = replyTargets.map((x) => x.children[0].outerHTML);

            var replyTexts = replyTargets.map(x => x.children[1].innerText);

            var i = 0;
            formattedReply = "";
            while (i < replyAuthors.length) {
                formattedReply += "<div class='quote'><div>\"" + replyTexts[i] + "\"</div>" +
                    "<div>     - " + replyAuthors[i] + "</div></div>"
                i++;
            }
            formattedReply = "<div class='quotedMessages'>" + formattedReply + "</div>"

        } else formattedReply = "";

        return formattedReply

    }

    var alertSound = new Audio("https://warmest-soup.github.io/Assets/Audio/ButtonClick.mp3");
    var playAlert = false;
    var notifState = false;

    window.send = function () {
        playAlert = true;

        var text = document.getElementById("Message").value

        text = text.replace(/\n/g, "</p><p>");

        var author = document.getElementById("Author").value
        var colorID = document.getElementById("Color").value
        var colorCheck = colorID.substring(0, 3).toLowerCase();


        if (!author) {
            author = "Anonymous";
        }
        if (!colorCheck) {
            colorID = "White"
        }

        if (text) {
            push(messagesLog, {
                author: author,
                reply: formatReply(),
                message: text,
                color: colorID,
                time: new Date().toUTCString(),
                stamp: Date.now()
            });
            document.getElementById("Message").value = "";



            messageLog.scrollTop = messageLog.scrollHeight;
        }
    };

    var clearHistory = true;
    
    onChildAdded(messagesLog, async snapshot => {
        var messageBox = document.getElementById("messages");

        var newMessage = snapshot.val()
        var bottomButton = document.getElementById("ToBottom");
        
        var jump;
        if (messageLog.scrollTop >= messageLog.scrollHeight - messageLog.clientHeight * 1.5) {
            jump = true;
            clearHistory = true;
        } else {
            jump = false;
            clearHistory = false;
        }

        var spacer;
        if (newMessage.reply) {
            spacer = "<p>  ⤷  ";
        } else spacer = "<p>     "

        var atFormattedMessage = atUser(newMessage.message);



        messageBox.lastElementChild.insertAdjacentHTML("beforeBegin", `<div>${newMessage.reply}<div class='SentMessages' onclick="replyTarget(this)"><div class='PrevAuthors' style='color:${newMessage.color};'>${newMessage.author}:</div> <div>${spacer}${atFormattedMessage}</p></div> <div class="timestamp"> ${newMessage.time} </div> </div></div>`);


        if (playAlert) {
            alertSound.play();
            if (Notification.permission === "granted" && notifState) {
                new Notification(newMessage.author, { body: newMessage.message });
            }
        }

        console.log(messageBox.children.length)

        if (jump == true) {

            while (messageBox.children.length > 99) {
                messageBox.children[0].remove()
            }

            messageLog.scrollTop = messageLog.scrollHeight;
        }


    })

    window.hotSend = function (e) {
        e.preventDefault()
        send();
    }

    window.setColorTest = function () {
        var color = document.getElementById("Color")
        var author = document.getElementById("Author")

        author.style.color = color.value;
        color.style.backgroundColor = color.value;
    }


    window.setUser = function (userName, userColor) {
        document.cookie = userName.value + ", " + userColor.value;
    }

    window.loadUser = function () {
        var lastName = document.cookie.split(", ")[0];
        var lastColor = document.cookie.split(", ")[1];
        if (lastName == "undefined") {
            lastName = "Anonymous";
        }
        if (lastColor == "undefined") {
            lastColor = "White";
        }
        document.getElementById("Author").value = lastName;
        document.getElementById("Color").value = lastColor;
    }

    window.replyTarget = function (target) {
        target.classList.toggle("reply2This")
    }

    window.addNewLine = function () {
        event.preventDefault();
        var textArea = document.getElementById("Message");
        textArea.value += "\n";
        textArea.focus();
    }

    window.atUser = function (text) {
        var usernames = Array.from(document.getElementsByClassName("PrevAuthors"));

        usernames.forEach((x) => {
            if (x.innerText.includes(":")) {
                text = text.replace(new RegExp(`(@${x.innerText.slice(0, -1)})`, "gi"), "<span class='namedAt' style='" + x.getAttribute("style") + "'>$1</span>")
            }

        })

        return text;
    }

    messageLog.scrollTop = messageLog.scrollHeight;
    loadUser()
    setColorTest()


    document.addEventListener("visibilitychange", () => {

        if (document.hidden) {
            notifState = true;

        } else {

            notifState = false;

        }

    })
</script>

<script>
    var bgOptions = 16.4;

    var url = "https://warmest-soup.github.io/Assets/Images/ChatroomBGs/";

    var randBG = url + Math.round(Math.random() * bgOptions);

    document.getElementById("messages").style.backgroundImage = "url('" + randBG + ".gif')";

    if (Notification.permission === "default") {
        Notification.requestPermission().then(p => p === "granted");
    }
    
    var messageLog = document.getElementById("messages");
    
    messageLog.addEventListener("scroll", function(){
        
        var bottomButton = document.getElementById("ToBottom");
        
        
        console.log(messageLog.scrollTop) 
        
        if (messageLog.scrollTop >= messageLog.scrollHeight - messageLog.clientHeight * 1.5) {
            bottomButton.setAttribute("style", "display:none;"); 
        } else {
            bottomButton.setAttribute("style", "display:block;");
        }
    })

</script>
